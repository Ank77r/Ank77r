<svg width="700" height="440" viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panelBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#1b1035"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00CFFF"/>
      <stop offset="100%" stop-color="#7F5AF0"/>
    </linearGradient>
  </defs>

  <rect width="700" height="440" rx="18" fill="url(#panelBg)" stroke="#2c2450" stroke-width="1.5"/>
  <text x="30" y="46" font-family="'Poppins',sans-serif" font-size="22" font-weight="700" fill="#ffffff">Core Stack</text>
  <line x1="30" y1="60" x2="670" y2="60" stroke="#2c2450" stroke-width="1"/>

  <g font-family="'Fira Code',Consolas,monospace" font-size="15" fill="#c9d1ff">
    <text x="30" y="92">Python</text>
    <rect x="30" y="100" width="640" height="9" rx="4.5" fill="#241c47"/>
    <rect x="30" y="100" height="9" rx="4.5" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="608" dur="1.1s" begin="0.1s" fill="freeze"/>
    </rect>

    <text x="30" y="146">Deep Learning — TensorFlow / PyTorch</text>
    <rect x="30" y="154" width="640" height="9" rx="4.5" fill="#241c47"/>
    <rect x="30" y="154" height="9" rx="4.5" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="512" dur="1.1s" begin="0.25s" fill="freeze"/>
    </rect>

    <text x="30" y="200">Computer Vision — OpenCV</text>
    <rect x="30" y="208" width="640" height="9" rx="4.5" fill="#241c47"/>
    <rect x="30" y="208" height="9" rx="4.5" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="474" dur="1.1s" begin="0.4s" fill="freeze"/>
    </rect>

    <text x="30" y="254">C++ / Java</text>
    <rect x="30" y="262" width="640" height="9" rx="4.5" fill="#241c47"/>
    <rect x="30" y="262" height="9" rx="4.5" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="435" dur="1.1s" begin="0.55s" fill="freeze"/>
    </rect>

    <text x="30" y="308">JavaScript / Frontend</text>
    <rect x="30" y="316" width="640" height="9" rx="4.5" fill="#241c47"/>
    <rect x="30" y="316" height="9" rx="4.5" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="396" dur="1.1s" begin="0.7s" fill="freeze"/>
    </rect>

    <text x="30" y="362">Git &amp; GitHub</text>
    <rect x="30" y="370" width="640" height="9" rx="4.5" fill="#241c47"/>
    <rect x="30" y="370" height="9" rx="4.5" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="550" dur="1.1s" begin="0.85s" fill="freeze"/>
    </rect>

    <text x="30" y="416">Blender / 3D Design</text>
    <rect x="30" y="424" width="640" height="9" rx="4.5" fill="#241c47"/>
    <rect x="30" y="424" height="9" rx="4.5" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="345" dur="1.1s" begin="1s" fill="freeze"/>
    </rect>
  </g>
</svg>
