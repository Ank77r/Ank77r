<svg width="700" height="440" viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panelBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#1b1035"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00CFFF"/>
      <stop offset="100%" stop-color="#7F5AF0"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="700" height="440" rx="18" fill="url(#panelBg)" stroke="#2c2450" stroke-width="1.5"/>
  <g>
    <circle cx="668" cy="24" r="4" fill="#22e07a"/>
    <circle cx="668" cy="24" r="4" fill="none" stroke="#22e07a" stroke-width="1" opacity="0.6">
      <animate attributeName="r" values="4;10;4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="30" y="46" font-family="'Poppins',sans-serif" font-size="22" font-weight="700" fill="#ffffff">Core Stack</text>
  <line x1="30" y1="60" x2="670" y2="60" stroke="#2c2450" stroke-width="1"/>

  <g font-family="'Fira Code',Consolas,monospace" font-size="15" fill="#c9d1ff">

    <text x="30" y="92">Python</text>
    <rect x="30" y="100" width="640" height="9" rx="4.5" fill="#241c47"/>
    <clipPath id="c1"><rect x="30" y="100" width="608" height="9" rx="4.5"/></clipPath>
    <rect x="30" y="100" width="608" height="9" rx="4.5" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="608" dur="1.1s" begin="0.1s" fill="freeze"/>
    </rect>
    <g clip-path="url(#c1)"><rect y="100" width="70" height="9" fill="url(#shimmer)"><animate attributeName="x" values="-70;700" dur="3.4s" begin="1.3s" repeatCount="indefinite"/></rect></g>

    <text x="30" y="146">Deep Learning — TensorFlow / PyTorch</text>
    <rect x="30" y="154" width="640" height="9" rx="4.5" fill="#241c47"/>
    <clipPath id="c2"><rect x="30" y="154" width="512" height="9" rx="4.5"/></clipPath>
    <rect x="30" y="154" width="512" height="9" rx="4.5" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="512" dur="1.1s" begin="0.25s" fill="freeze"/>
    </rect>
    <g clip-path="url(#c2)"><rect y="154" width="70" height="9" fill="url(#shimmer)"><animate attributeName="x" values="-70;700" dur="3.4s" begin="1.5s" repeatCount="indefinite"/></rect></g>

    <text x="30" y="200">Computer Vision — OpenCV</text>
    <rect x="30" y="208" width="640" height="9" rx="4.5" fill="#241c47"/>
    <clipPath id="c3"><rect x="30" y="208" width="474" height="9" rx="4.5"/></clipPath>
    <rect x="30" y="208" width="474" height="9" rx="4.5" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="474" dur="1.1s" begin="0.4s" fill="freeze"/>
    </rect>
    <g clip-path="url(#c3)"><rect y="208" width="70" height="9" fill="url(#shimmer)"><animate attributeName="x" values="-70;700" dur="3.4s" begin="1.7s" repeatCount="indefinite"/></rect></g>

    <text x="30" y="254">C++ / Java</text>
    <rect x="30" y="262" width="640" height="9" rx="4.5" fill="#241c47"/>
    <clipPath id="c4"><rect x="30" y="262" width="435" height="9" rx="4.5"/></clipPath>
    <rect x="30" y="262" width="435" height="9" rx="4.5" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="435" dur="1.1s" begin="0.55s" fill="freeze"/>
    </rect>
    <g clip-path="url(#c4)"><rect y="262" width="70" height="9" fill="url(#shimmer)"><animate attributeName="x" values="-70;700" dur="3.4s" begin="1.9s" repeatCount="indefinite"/></rect></g>

    <text x="30" y="308">JavaScript / Frontend</text>
    <rect x="30" y="316" width="640" height="9" rx="4.5" fill="#241c47"/>
    <clipPath id="c5"><rect x="30" y="316" width="396" height="9" rx="4.5"/></clipPath>
    <rect x="30" y="316" width="396" height="9" rx="4.5" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="396" dur="1.1s" begin="0.7s" fill="freeze"/>
    </rect>
    <g clip-path="url(#c5)"><rect y="316" width="70" height="9" fill="url(#shimmer)"><animate attributeName="x" values="-70;700" dur="3.4s" begin="2.1s" repeatCount="indefinite"/></rect></g>

    <text x="30" y="362">Git &amp; GitHub</text>
    <rect x="30" y="370" width="640" height="9" rx="4.5" fill="#241c47"/>
    <clipPath id="c6"><rect x="30" y="370" width="550" height="9" rx="4.5"/></clipPath>
    <rect x="30" y="370" width="550" height="9" rx="4.5" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="550" dur="1.1s" begin="0.85s" fill="freeze"/>
    </rect>
    <g clip-path="url(#c6)"><rect y="370" width="70" height="9" fill="url(#shimmer)"><animate attributeName="x" values="-70;700" dur="3.4s" begin="2.3s" repeatCount="indefinite"/></rect></g>

    <text x="30" y="416">Blender / 3D Design</text>
    <rect x="30" y="424" width="640" height="9" rx="4.5" fill="#241c47"/>
    <clipPath id="c7"><rect x="30" y="424" width="345" height="9" rx="4.5"/></clipPath>
    <rect x="30" y="424" width="345" height="9" rx="4.5" fill="url(#barGrad)">
      <animate attributeName="width" from="0" to="345" dur="1.1s" begin="1s" fill="freeze"/>
    </rect>
    <g clip-path="url(#c7)"><rect y="424" width="70" height="9" fill="url(#shimmer)"><animate attributeName="x" values="-70;700" dur="3.4s" begin="2.5s" repeatCount="indefinite"/></rect></g>

  </g>
</svg>
