<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#1b1035"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="textGradD" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00CFFF"/>
      <stop offset="100%" stop-color="#7F5AF0"/>
    </linearGradient>
    <radialGradient id="glowSpotD" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00CFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00CFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowD" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="gridD" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <clipPath id="typeClipD">
      <rect x="0" y="0" height="34" width="0">
        <animate attributeName="width" values="0;640;640;0;0" keyTimes="0;0.35;0.6;0.68;1" dur="7s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="1200" height="300" fill="url(#bgD)"/>
  <rect width="1200" height="300" fill="url(#gridD)"/>
  <circle cx="600" cy="150" r="270" fill="url(#glowSpotD)"/>

  <g transform="translate(140,150)">
    <polygon points="0,-55 48,-27 48,27 0,55 -48,27 -48,-27" fill="none" stroke="url(#textGradD)" stroke-width="2.5" opacity="0.85">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="16s" repeatCount="indefinite"/>
    </polygon>
    <text x="0" y="8" text-anchor="middle" font-family="Consolas, monospace" font-size="24" fill="url(#textGradD)">&lt;/&gt;</text>
    <circle r="3.2" fill="#00CFFF">
      <animateMotion dur="6s" repeatCount="indefinite" path="M 0,-55 A 55,55 0 1,1 -0.1,-55"/>
    </circle>
  </g>

  <g transform="translate(1060,150)">
    <polygon points="0,-55 48,-27 48,27 0,55 -48,27 -48,-27" fill="none" stroke="url(#textGradD)" stroke-width="2.5" opacity="0.85">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="16s" repeatCount="indefinite"/>
    </polygon>
    <text x="0" y="7" text-anchor="middle" font-family="Consolas, monospace" font-size="20" fill="url(#textGradD)">AI</text>
  </g>

  <text x="600" y="128" text-anchor="middle" font-family="'Poppins','Segoe UI',sans-serif" font-weight="700" font-size="50" fill="url(#textGradD)" filter="url(#glowD)">Ankur Pandey</text>

  <rect x="480" y="148" width="240" height="3" rx="1.5" fill="url(#textGradD)"/>

  <g clip-path="url(#typeClipD)">
    <text x="280" y="200" font-family="'Fira Code',Consolas,monospace" font-size="22" fill="#c9d1ff">Computer Science Engineer · AI/ML · Builder</text>
  </g>
  <rect x="280" y="178" width="3" height="24" fill="#00CFFF">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.51;1" dur="0.9s" repeatCount="indefinite"/>
  </rect>
</svg>
