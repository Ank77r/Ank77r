<svg width="1200" height="24" viewBox="0 0 1200 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00CFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7F5AF0"/>
      <stop offset="100%" stop-color="#00CFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="11" width="1200" height="2" fill="url(#lineGrad)"/>
  <circle cx="600" cy="12" r="4" fill="#00CFFF"/>
  <circle cx="600" cy="12" r="4" fill="none" stroke="#00CFFF" stroke-width="1" opacity="0.5">
    <animate attributeName="r" values="4;11;4" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2.6s" repeatCount="indefinite"/>
  </circle>
